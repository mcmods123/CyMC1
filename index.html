<!DOCTYPE html>
<html>
<head>
<title>CY Mods</title>

<style>
body{
font-family:Arial,sans-serif;
background:#0a0a0a;
color:white;
margin:0;
}

header{
background:linear-gradient(90deg,#4c1d95,#7c3aed);
padding:50px;
text-align:center;
box-shadow:0 0 20px #7c3aed;
}

h1{
font-size:55px;
margin:0;
}

.card{
background:#161616;
width:300px;
margin:20px;
padding:15px;
border-radius:15px;
display:inline-block;
border:2px solid #7c3aed;
box-shadow:0 0 15px rgba(124,58,237,0.4);
}

.btn{
background:#7c3aed;
color:white;
padding:12px 25px;
text-decoration:none;
border-radius:8px;
font-weight:bold;
display:inline-block;
}

p{
color:#cfcfcf;
}
</style>

</head>
<body>

<header>
<h1>⚡ CY MODS ⚡</h1>
<p>Os melhores addons para Minecraft Bedrock</p>
</header>

<center>

<div class="card">
<h2>Vein Miner</h2>
<p>Quebre veios inteiros de minério.</p>
<a class="btn" href="#">Baixar</a>
</div>

<div class="card">
<h2>More Tools</h2>
<p>Novas ferramentas para sobrevivência.</p>
<a class="btn" href="#">Baixar</a>
</div>

</center>

</body>
</html>
