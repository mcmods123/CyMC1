<!DOCTYPE html>

<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CY Mods</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#e9e9e9;
background-image:
linear-gradient(#d8d8d8 1px, transparent 1px),
linear-gradient(90deg,#d8d8d8 1px, transparent 1px);
background-size:30px 30px;
}

header{
background:#111;
color:white;
padding:20px;
text-align:center;
border-bottom:4px solid #7c3aed;
}

header h1{
font-size:50px;
color:#a855f7;
}

.mods{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
padding:20px;
}

.card{
width:240px;
background:white;
border:4px solid black;
box-shadow:6px 6px 0 black;
}

.img{
height:140px;
background:#333;
background-size:cover;
background-position:center;
}

.info{
padding:12px;
}

.tag{
display:inline-block;
background:#7c3aed;
color:white;
font-size:12px;
padding:4px 8px;
font-weight:bold;
margin-bottom:8px;
}

.version{
float:right;
border:2px solid black;
padding:2px 8px;
font-size:12px;
font-weight:bold;
}

h3{
font-size:16px;
margin:10px 0;
}

.desc{
font-size:14px;
color:#555;
margin-bottom:10px;
}

.stars{
color:orange;
font-size:18px;
margin-bottom:10px;
}

.buttons{
display:flex;
gap:8px;
}

.download{
flex:1;
text-align:center;
padding:12px;
background:white;
border:3px solid black;
box-shadow:4px 4px 0 black;
text-decoration:none;
color:black;
font-weight:bold;
}

.share{
width:50px;
text-align:center;
padding:12px;
background:white;
border:3px solid black;
box-shadow:4px 4px 0 black;
text-decoration:none;
color:black;
}

.download:hover,
.share:hover{
transform:translate(2px,2px);
box-shadow:2px 2px 0 black;
}

footer{
margin-top:30px;
padding:20px;
background:#111;
color:white;
text-align:center;
}
</style>

</head>
<body>

<header>
<h1>⚡ CY MODS ⚡</h1>
<p>Addons para Minecraft Bedrock</p>
</header>

<div class="mods">

<div class="card">
<div class="img" style="background-image:url('https://picsum.photos/400/200?1')"></div>

<div class="info">
<span class="tag">UTILIDADES</span>
<span class="version">v5.5</span>

<h3>VEIN MINER</h3>

<p class="desc">
Quebre veios inteiros de minério instantaneamente.
</p>

<div class="stars">★★★★★</div>

<div class="buttons">
<a class="download"
href="https://github.com/mcmods123/CyMC1/raw/main/Utilities_Vein_Miner_v5.5%20BP.zip"
target="_blank">
BAIXAR
</a>

<a class="share"
href="https://wa.me/?text=Confira%20o%20Vein%20Miner%20na%20CY%20Mods"
target="_blank">
↗ </a>

</div>
</div>
</div>

</div>

<footer>
© 2026 CY Mods
</footer>

</body>
</html>
