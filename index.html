<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Cy Addons - Minecraft Bedrock</title>

<meta name="description" content="52+ Addons gratuitos para Minecraft Bedrock">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{
--roxo:#7b2cff;
--roxo2:#b05cff;
--preto:#0a0a0a;
--cinza:#181818;
--branco:#ffffff;
}

html{
scroll-behavior:smooth;
}

body{
font-family:Arial,Helvetica,sans-serif;
background:#fff;
overflow-x:hidden;
color:#111;
}

/* FUNDO */

.bg{
position:fixed;
inset:0;
z-index:-5;
overflow:hidden;
}

.bg::before{
content:"";
position:absolute;
inset:0;
background:
radial-gradient(circle at top,
rgba(123,44,255,.25),
transparent 45%);
}

.floating{
position:absolute;
width:180px;
height:180px;
object-fit:cover;
border:4px solid #111;
box-shadow:8px 8px 0 #111;
opacity:.13;
animation:float 18s ease-in-out infinite;
}

@keyframes float{

0%{
transform:
translateY(0px)
rotate(-8deg)
scale(1);
}

50%{
transform:
translateY(-25px)
rotate(4deg)
scale(1.05);
}

100%{
transform:
translateY(0px)
rotate(-8deg)
scale(1);
}

}

.floating:nth-child(2){
animation-duration:20s;
}

.floating:nth-child(3){
animation-duration:22s;
}

.floating:nth-child(4){
animation-duration:24s;
}

.floating:nth-child(5){
animation-duration:26s;
}

.floating:nth-child(6){
animation-duration:28s;
}

/* HERO */

.hero{
padding:35px 15px 50px;
text-align:center;
}

.counter{
display:inline-block;
background:#fff;
border:3px solid #111;
box-shadow:5px 5px 0 #111;
padding:10px 20px;
font-weight:900;
margin-bottom:15px;
}

.live{
font-weight:900;
color:var(--roxo);
margin-bottom:15px;
}

.logo{
font-size:clamp(48px,8vw,110px);
font-weight:1000;
color:#fff;
display:inline-block;
padding:10px 25px;
background:linear-gradient(
90deg,
var(--roxo),
var(--roxo2)
);
border:4px solid #fff;
box-shadow:
10px 10px 0 #111,
0 0 40px rgba(123,44,255,.4);
}

.sub{
margin-top:20px;
font-size:20px;
font-weight:900;
line-height:1.4;
}

.free{
margin-top:20px;
display:inline-block;
padding:15px 25px;
border:3px dashed var(--roxo);
background:#fff;
font-weight:900;
}

/* MENU */

.nav{
background:#050505;
display:flex;
justify-content:center;
gap:25px;
padding:15px;
overflow:auto;
border-top:4px solid #111;
border-bottom:4px solid #111;
}

.nav a{
text-decoration:none;
color:white;
font-weight:900;
white-space:nowrap;
}

/* CONTAINER */

.container{
max-width:1350px;
margin:auto;
padding:20px;
}

/* SOCIAL */

.social{
background:#fff;
border:3px solid #111;
box-shadow:5px 5px 0 #111;
padding:20px;
margin-bottom:30px;
text-align:center;
}

.social h2{
color:var(--roxo);
margin-bottom:15px;
}

.social-buttons{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
}

.social-buttons button{
height:55px;
font-weight:900;
border:3px solid #111;
background:#fff;
cursor:pointer;
box-shadow:5px 5px 0 #111;
}

/* TOPO ADDONS */

.topbar{
display:grid;
grid-template-columns:1fr 350px 150px;
gap:12px;
align-items:end;
margin-bottom:25px;
}

.title{
font-size:55px;
font-weight:1000;
line-height:1;
}

.search,
.select{
height:48px;
border:3px solid #111;
padding:0 12px;
font-weight:900;
}

/* CATEGORIAS */

.tabs{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:25px;
}

.tabs button{
padding:10px 18px;
font-weight:900;
border:3px solid #111;
background:#fff;
cursor:pointer;
}

.tabs button:hover,
.tabs .active{
background:var(--roxo);
color:white;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:18px;
}

.card{
background:white;
border:3px solid #111;
box-shadow:5px 5px 0 #111;
overflow:hidden;
transition:.2s;
}

.card:hover{
transform:translateY(-6px);
}

.card-img{
height:190px;
background:#111;
overflow:hidden;
}

.card-img img{
width:100%;
height:100%;
object-fit:cover;
}

.card-body{
padding:15px;
}

.card-body h3{
margin-bottom:10px;
}

.card-body p{
font-size:13px;
line-height:1.4;
color:#555;
margin-bottom:12px;
}

.download{
display:block;
text-align:center;
height:45px;
line-height:39px;
font-weight:900;
border:3px solid #111;
text-decoration:none;
color:#111;
box-shadow:4px 4px 0 #111;
}

.download:hover{
background:var(--roxo);
color:white;
}

/* RESPONSIVO */

@media(max-width:1100px){

.grid{
grid-template-columns:repeat(3,1fr);
}

.topbar{
grid-template-columns:1fr;
}

}

@media(max-width:700px){

.grid{
grid-template-columns:repeat(2,1fr);
}

.social-buttons{
grid-template-columns:1fr;
}

}

@media(max-width:500px){

.grid{
grid-template-columns:1fr;
}

.logo{
font-size:52px;
}

}

</style>
</head>
<body>

<div class="bg" id="bg"></div>
<section class="hero">

<div class="counter">
52+ ADDONS GRÁTIS
</div>

<div class="live">
● PESSOAS BAIXANDO AGORA
</div>

<div class="logo">
CY ADDONS
</div>

<p class="sub">
Os addons mais populares ficam no topo.<br>
Novos addons aparecem automaticamente.
</p>

<div class="free">
100% GRÁTIS • SEM CADASTRO
</div>

</section>

<nav class="nav">
<a href="#">ADDONS</a>
<a href="#">TEXTURAS</a>
<a href="#">MOBS</a>
<a href="#">MAPAS</a>
<a href="#">UTILIDADES</a>
<a href="#">VISUAL</a>
<a href="#">RPG</a>
<a href="#">SURVIVAL</a>
</nav>

<div class="container">

<section class="social">

<h2>SIGA O CRIADOR</h2>

<div class="social-buttons">
<button>DISCORD</button>
<button>INSTAGRAM</button>
<button>YOUTUBE</button>
</div>

</section>

<div class="topbar">

<div>
<div style="font-weight:900;">
ADDONS
</div>

<div class="title">
TODA A COLEÇÃO
</div>

<p id="totalAddons">
Carregando addons...
</p>

</div>

<input
id="search"
class="search"
placeholder="Buscar addon..."
>

<select
id="category"
class="select"
>
<option value="todos">TODOS</option>
<option value="utilidades">UTILIDADES</option>
<option value="visual">VISUAL</option>
<option value="texturas">TEXTURAS</option>
<option value="construcao">CONSTRUÇÃO</option>
<option value="java">JAVA</option>
<option value="mobs">MOBS</option>
<option value="survival">SURVIVAL</option>
<option value="rpg">RPG</option>
</select>

</div>

<div class="grid" id="grid"></div>

</div>
<script>

const addons = [

{
nome:"Afk Chunk Loader",
categoria:"utilidades",
imagem:"imagens/Afk_Chunk_Loader.jpg",
arquivo:"addons/Afk_Chunk_Loader_bot.mcaddon",
descricao:"Mantém chunks carregados para farms automáticas."
},

{
nome:"Backpack Addon",
categoria:"utilidades",
imagem:"imagens/backpack addon.png",
arquivo:"addons/OTG Backpack v1.0.6.mcaddon",
descricao:"Mochilas para carregar mais itens."
},

{
nome:"Camera Addon",
categoria:"visual",
imagem:"imagens/camera addon.png",
arquivo:"addons/Cinecam by domikalmazika.mcaddon",
descricao:"Câmera cinematográfica para vídeos."
},

{
nome:"Effortless Building",
categoria:"construcao",
imagem:"imagens/construção addon.png",
arquivo:"addons/Effortless Building v3.1.mcaddon",
descricao:"Construa estruturas rapidamente."
},

{
nome:"Java Spawn In Bedrock",
categoria:"java",
imagem:"imagens/mob boster java.png",
arquivo:"addons/JavaSpawnInBedrock.mcpack",
descricao:"Recursos inspirados na versão Java."
},

{
nome:"Multiply Ores",
categoria:"utilidades",
imagem:"imagens/multiplidor de minerios png.webp",
arquivo:"addons/MultiplyOresby@ncmine.mcaddon",
descricao:"Multiplica a quantidade de minérios."
},

{
nome:"Night Vision",
categoria:"visual",
imagem:"imagens/nigth vision png.webp",
arquivo:"addons/NIGHT VISION ATUALIZADA.mcpack",
descricao:"Visão noturna permanente."
},

{
nome:"OP Villagers",
categoria:"survival",
imagem:"imagens/op vilagers png.webp",
arquivo:"addons/oneesmeralde.mcpack",
descricao:"Trocas extremamente fortes."
},

{
nome:"Vein Miner",
categoria:"utilidades",
imagem:"imagens/veimaner.png",
arquivo:"addons/Utilities_Vein_Miner_v5.5 BP.zip",
descricao:"Quebre uma veia inteira de minério."
},

{
nome:"Simple Waystone",
categoria:"survival",
imagem:"imagens/waystone.jpg",
arquivo:"addons/Simple_Waystone_v8.2_Full.mcaddon",
descricao:"Sistema de teleporte."
},

{
nome:"Mini Map",
categoria:"utilidades",
imagem:"imagens/mini map addon.jpg",
arquivo:"addons/Real Minimap Add-On addon.mcaddon",
descricao:"Minimapa em tempo real."
},

{
nome:"Diamante Ultra 200%",
categoria:"texturas",
imagem:"imagens/diamante 200x.webp",
arquivo:"addons/_MConverter.eu_diamond ultra 200%.mcpack",
descricao:"Textura HD para diamantes."
}

];

const prioridade = [
"Vein Miner",
"Effortless Building",
"Night Vision",
"Mini Map",
"Backpack Addon",
"Simple Waystone"
];

addons.sort((a,b)=>{
let pa=prioridade.indexOf(a.nome);
let pb=prioridade.indexOf(b.nome);

if(pa===-1) pa=999;
if(pb===-1) pb=999;

return pa-pb;
});

document.getElementById("totalAddons").innerHTML =
addons.length + " addons prontos para baixar.";

const grid = document.getElementById("grid");

function render(){

let busca =
document.getElementById("search")
.value
.toLowerCase();

let categoria =
document.getElementById("category")
.value;

grid.innerHTML="";

addons
.filter(addon=>{

let okBusca =
addon.nome.toLowerCase().includes(busca);

let okCategoria =
categoria==="todos" ||
addon.categoria===categoria;

return okBusca && okCategoria;

})

.forEach(addon=>{

grid.innerHTML += `

<div class="card">

<div class="card-img">
<img src="${addon.imagem}">
</div>

<div class="card-body">

<h3>${addon.nome}</h3>

<p>
${addon.descricao}
</p>

<a
class="download"
href="${addon.arquivo}"
download
>
BAIXAR
</a>

</div>

</div>

`;

});

}

document
.getElementById("search")
.addEventListener("input",render);

document
.getElementById("category")
.addEventListener("change",render);

render();

/* FUNDO ALEATÓRIO */

const fundo = document.getElementById("bg");

const imagens = [

"imagens/Afk_Chunk_Loader.jpg",
"imagens/camera addon.png",
"imagens/construção addon.png",
"imagens/mini map addon.jpg",
"imagens/diamante 200x.webp",
"imagens/nigth vision png.webp",
"imagens/op vilagers png.webp",
"imagens/veimaner.png"

];

for(let i=0;i<12;i++){

let img =
document.createElement("img");

img.src =
imagens[
Math.floor(
Math.random()*imagens.length
)
];

img.className="floating";

img.style.left =
Math.random()*100+"%";

img.style.top =
Math.random()*100+"%";

img.style.transform =
`rotate(${Math.random()*40-20}deg)`;

fundo.appendChild(img);

}

</script>

</body>
</html>
