<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CY Mods</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0b0b0b;
color:white;
overflow-x:hidden;
}

/* FUNDO */
.bg{
position:fixed;
inset:0;
z-index:-3;
background:
radial-gradient(circle at top, #1a1a1a, #000),
linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
background-size:48px 48px;
animation: moveGrid 25s linear infinite;
}

@keyframes moveGrid{
from{background-position:0 0;}
to{background-position:48px 48px;}
}

/* BANNER */
header{
text-align:center;
padding:70px 20px;
background: linear-gradient(135deg, #111, #000);
border-bottom:4px solid #7c3aed;
}

header h1{
font-size:60px;
color:#a855f7;
}

header p{
color:#ccc;
margin-top:10px;
}

/* SEARCH */
.search-box{
display:flex;
justify-content:center;
padding:15px;
background:#0f0f0f;
border-bottom:2px solid #7c3aed;
}

.search-box input{
width:320px;
max-width:90%;
padding:10px;
border:2px solid #7c3aed;
background:#181818;
color:white;
outline:none;
text-align:center;
}

/* MODS GRID (PC) */
.mods{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:25px;
padding:30px;
}

/* CARD */
.card{
width:280px;
background:#181818;
border:3px solid #7c3aed;
box-shadow:8px 8px 0 #7c3aed;
overflow:hidden;
transition:.2s;
}

.card:hover{
transform:translateY(-5px);
box-shadow:12px 12px 0 #a855f7;
}

.img{
height:180px;
background-size:cover;
background-position:center;
}

.info{
padding:15px;
}

.tag{
display:inline-block;
background:#7c3aed;
padding:5px 10px;
font-size:12px;
font-weight:bold;
}

.version{
float:right;
font-size:12px;
padding:4px 8px;
border:2px solid #7c3aed;
}

h3{
margin-top:12px;
margin-bottom:10px;
font-size:18px;
}

.desc{
color:#ccc;
font-size:14px;
margin-bottom:12px;
}

.buttons{
display:flex;
gap:8px;
}

.download{
flex:1;
text-decoration:none;
text-align:center;
padding:12px;
background:#7c3aed;
color:white;
font-weight:bold;
}

.hidden{
display:none !important;
}

/* FOOTER */
footer{
margin-top:20px;
padding:20px;
text-align:center;
background:#111;
border-top:4px solid #7c3aed;
}

/* 🔥 RESPONSIVO MOBILE */
@media (max-width: 768px){

header h1{
font-size:38px;
}

.mods{
gap:15px;
padding:15px;
}

/* cards centralizados e maiores */
.card{
width:90%;
}

/* botões melhor alinhados */
.buttons{
flex-direction:column;
}

.download{
padding:14px;
}

}

</style>
</head>

<body>

<div class="bg"></div>

<header>
<h1>⚡ CY MODS ⚡</h1>
<p>Os melhores addons para Minecraft Bedrock</p>
</header>

<div class="search-box">
<input type="text" id="search" placeholder="Pesquise o nome do addon..." onkeyup="searchMods()">
</div>

<div class="mods">

<div class="card">
<div class="img" style="background-image:url('imagens/veimaner.png')"></div>
<div class="info">
<span class="tag">UTILIDADES</span>
<span class="version">v5.5</span>
<h3 class="title">VEIN MINER</h3>
<p class="desc">Quebre veios inteiros de minério automaticamente.</p>
<div class="buttons">
<a class="download" href="#">BAIXAR</a>
</div>
</div>
</div>

<div class="card">
<div class="img" style="background-image:url('imagens/nigth vision png.webp')"></div>
<div class="info">
<span class="tag">UTILIDADES</span>
<span class="version">v1.0</span>
<h3 class="title">NIGHT VISION</h3>
<p class="desc">Visão noturna permanente para explorar qualquer lugar.</p>
<div class="buttons">
<a class="download" href="#">BAIXAR</a>
</div>
</div>
</div>

</div>

<footer>
© 2026 CY Mods
</footer>

<script>

function searchMods(){
let input = document.getElementById("search").value.toLowerCase();
let cards = document.querySelectorAll(".card");

cards.forEach(card=>{
let title = card.querySelector(".title").innerText.toLowerCase();

if(input === "" || title.includes(input)){
card.classList.remove("hidden");
}else{
card.classList.add("hidden");
}
});
}

</script>

</body>
</html>
